services:
  api:
    container_name: tideo_api
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').getcode() == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - data:/data
    networks:
      - tideo-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy

  redis:
    image: redis:7
    container_name: tideo_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - redis_data:/data
    networks:
      - tideo-net
  
  postgres:
    image: postgres:16
    container_name: tideo_pg
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - tideo-net
  
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: tideo_rabbit
    hostname: tideo_rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "nc", "-z", "-w2", "127.0.0.1", "5672"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - tideo-net
  
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka
    container_name: tideo_kafka
    ports:
      - "29092:29092"
    env_file:
      - kafka.env
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s 
    volumes:
      - kafka_data:/var/lib/kafka
    networks:
      - tideo-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tideo_kafka_ui
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - tideo-net
  
  worker-heavy:
    container_name: tideo_worker_heavy
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -q -A app.workers.celery_app worker -Q transcode --concurrency=2 --prefetch-multiplier=1 -n heavy@%h --loglevel=info
    volumes:
      - .:/app
      - data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d heavy@$$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - tideo-net

  worker-fast:
    container_name: tideo_worker_fast
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -q -A app.workers.celery_app worker -Q inspect,package,transcribe,cleanup --concurrency=4 --prefetch-multiplier=4 -n fast@%h --loglevel=info
    volumes:
      - .:/app
      - data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d fast@$$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - tideo-net

  dispatcher:
    container_name: tideo_dispatcher
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python -m app.dispatcher
    volumes:
      - .:/app
      - data:/data
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - tideo-net

  beat:
    container_name: tideo_beat
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -q -A app.workers.celery_app beat --schedule=/data/celerybeat-schedule --loglevel=info
    volumes:
      - .:/app
      - data:/data
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tideo-net

  flower:
    container_name: tideo_flower
    profiles: ["dev"]                     # dev-only: `docker compose --profile dev up flower`
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tideo-net

  audit:
    container_name: tideo_audit
    restart: unless-stopped
    build: 
      context: .
      dockerfile: Dockerfile.worker
    command: python -m app.dispatcher.audit
    volumes:
      - .:/app
      - data:/data
    env_file: 
      - .env
    depends_on:
      kafka: 
        condition: service_healthy
      postgres: 
        condition: service_healthy
    networks: 
      - tideo-net

volumes:
  redis_data:
  pg_data:
  rabbitmq_data:
  kafka_data:
  data:

networks:
  tideo-net:
    driver: bridge